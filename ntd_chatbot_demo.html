<title>NTD Purchase Orders Chatbot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: #f0f4f8; height: 100vh; display: flex; flex-direction: column; }

  header { background: #1a3c5e; color: white; padding: 16px 24px;
           display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  header .logo { width: 36px; height: 36px; background: #4a9fd4; border-radius: 8px;
                 display: flex; align-items: center; justify-content: center; font-size: 20px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header p  { font-size: 12px; opacity: 0.7; margin-top: 2px; }
  .badge { background: #2ecc71; color: white; font-size: 11px; padding: 2px 8px;
           border-radius: 20px; margin-left: auto; }

  .chat-area { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex;
               flex-direction: column; gap: 16px; max-width: 900px; width: 100%; margin: 0 auto; }

  .msg { display: flex; gap: 10px; }
  .msg.user { flex-direction: row-reverse; }
  .msg .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
                 display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .msg.bot  .avatar { background: #1a3c5e; color: white; }
  .msg.user .avatar { background: #4a9fd4; color: white; }
  .bubble { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
  .msg.bot  .bubble { background: white; border-radius: 4px 16px 16px 16px;
                      box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .msg.user .bubble { background: #1a3c5e; color: white; border-radius: 16px 4px 16px 16px; }

  .summary-card { background: #f8fbff; border: 1px solid #d0e4f4; border-radius: 10px;
                  padding: 14px; margin: 10px 0; }
  .summary-card h3 { font-size: 13px; color: #1a3c5e; font-weight: 700; margin-bottom: 10px;
                     text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; }
  .stat { background: white; border-radius: 8px; padding: 10px; text-align: center;
          border: 1px solid #e8f0f8; }
  .stat .val { font-size: 20px; font-weight: 700; color: #1a3c5e; }
  .stat .lbl { font-size: 11px; color: #666; margin-top: 2px; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
  th { background: #1a3c5e; color: white; padding: 7px 10px; text-align: left;
       font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; }
  td { padding: 7px 10px; border-bottom: 1px solid #eef2f7; }
  tr:nth-child(even) td { background: #f8fbff; }
  tr:hover td { background: #e8f4ff; }
  .status-pill { display: inline-block; padding: 2px 8px; border-radius: 10px;
                 font-size: 11px; font-weight: 600; white-space: nowrap; }
  .note { font-size: 12px; color: #888; font-style: italic; margin-top: 6px; }

  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 16px 8px;
                 max-width: 900px; width: 100%; align-self: center; }
  .chip { background: white; border: 1px solid #c0d8ef; color: #1a3c5e; padding: 6px 12px;
          border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .chip:hover { background: #1a3c5e; color: white; border-color: #1a3c5e; }

  .input-bar { background: white; border-top: 1px solid #ddd; padding: 12px 16px;
               display: flex; gap: 10px; max-width: 900px; width: 100%;
               align-self: center; }
  .input-bar input { flex: 1; border: 1.5px solid #c0d8ef; border-radius: 24px;
                     padding: 10px 18px; font-size: 14px; outline: none; }
  .input-bar input:focus { border-color: #1a3c5e; }
  .input-bar button { background: #1a3c5e; color: white; border: none; border-radius: 24px;
                      padding: 10px 22px; font-size: 14px; cursor: pointer; }
  .input-bar button:hover { background: #2a5c8e; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing span { width: 7px; height: 7px; background: #aac; border-radius: 50%;
                 animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
</style>
</head>

<script>
const RAW = JSON.parse(document.getElementById('ntd-data').textContent);

// ── helpers ──────────────────────────────────────────────────────────────────
function fmt(n){ if(n==null) return '—'; return Number(n).toLocaleString(); }
function fmtB(n){ if(!n) return '—'; if(n>=1e9) return (n/1e9).toFixed(2)+'B'; if(n>=1e6) return (n/1e6).toFixed(1)+'M'; return fmt(n); }
function pct(a,b){ return b ? Math.round(100*a/b)+'%' : '—'; }
function statusClass(s){ return s==='Delivered'?'background:#d4f4e4;color:#1a7a4a': s==='In Transit'?'background:#fff3d4;color:#8a5a00': s==='In Pipeline'?'background:#e8eeff;color:#3a4aaa':'background:#eee;color:#666'; }

const DRUG_MAP = RAW.drugs;
const DRUG_ALIASES = {
  albendazole:'ALB',alb:'ALB',
  diethylcarbamazine:'DEC',dec:'DEC',
  ivermectin:'IVM',ivm:'IVM',
  mebendazole:'MEB',meb:'MEB',
  praziquantel:'PZQ',pzq:'PZQ',
  triclabendazole:'TCZ',tcz:'TCZ'
};

function detectDrug(q){
  const ql=q.toLowerCase();
  for(const [a,c] of Object.entries(DRUG_ALIASES)) if(ql.includes(a)) return c;
  return null;
}
function detectDonor(q){
  const ql=q.toLowerCase();
  if(ql.includes('merck kgaa')||ql.includes('merck kg')) return 'Merck KGaA';
  if(ql.includes('merck usa')) return 'Merck USA';
  if(ql.match(/\bmerck\b/) && !ql.includes('kgaa') && !ql.includes('usa') && !ql.includes('pzq') && !ql.includes('praziquantel')) return '__ambiguous__';
  if(ql.includes('merck')) return ql.includes('pzq')||ql.includes('praziquantel') ? 'Merck KGaA' : 'Merck USA';
  for(const d of RAW.donors) if(ql.includes(d.toLowerCase())) return d;
  return null;
}
function detectCountry(q){
  const ql=q.toLowerCase();
  for(const c of RAW.countries) if(ql.includes(c.toLowerCase())) return c;
  return null;
}
function detectYear(q){ const m=q.match(/\b(20[12]\d)\b/); return m?parseInt(m[1]):null; }
function detectStatus(q){
  const ql=q.toLowerCase();
  if(ql.includes('in transit')||ql.includes('transit')) return 'In Transit';
  if(ql.includes('delivered')||ql.includes('completed')) return 'Delivered';
  if(ql.includes('pending')||ql.includes('active')||ql.includes('in progress')||ql.includes('pipeline')) return 'In Pipeline';
  return null;
}

// ── query engine ──────────────────────────────────────────────────────────────
function query(userQ){
  const q=userQ.trim(), ql=q.toLowerCase();

  if(ql.match(/^(overview|summary|all|total|everything|stats|hi\b|hello\b)/)||ql==='?')
    return makeOverview();

  const drug=detectDrug(q), donor=detectDonor(q), country=detectCountry(q);
  const year=detectYear(q), status=detectStatus(q);

  if(donor==='__ambiguous__')
    return {type:'clarify',text:'Did you mean <b>Merck KGaA</b> (donates Praziquantel/PZQ) or <b>Merck USA</b> (donates Ivermectin & Triclabendazole)?'};

  const wantsCountries = ql.includes('countr')||ql.includes('support')||ql.includes('where')||ql.includes('nation')||ql.includes('list');

  if(donor && wantsCountries && !country) return makeDonorCountries(donor);
  if(donor && !country && !drug && !year && !status) return makeDonorSummary(donor);
  if(drug  && !country && !donor && !year && !status) return makeDrugSummary(drug);
  if(country && !drug && !donor && !year && !status) return makeCountrySummary(country);

  // Filtered PO list
  let rows=RAW.pos;
  if(drug)   rows=rows.filter(r=>r.drug_code===drug);
  if(donor)  rows=rows.filter(r=>r.donor===donor);
  if(country)rows=rows.filter(r=>r.country&&r.country.toLowerCase()===country.toLowerCase());
  if(year)   rows=rows.filter(r=>r.year===year);
  if(status) rows=rows.filter(r=>r.delivery_status===status);
  if(!rows.length) return {type:'noresult',text:`No purchase orders matched your query. Try checking drug names (ALB, PZQ, MEB, DEC, IVM, TCZ), country names, or donor names.`};

  const total=rows.length, tablets=rows.reduce((s,r)=>s+(r.quantity||0),0);
  const delivered=rows.filter(r=>r.delivery_status==='Delivered').length;
  const parts=[];
  if(drug) parts.push(DRUG_MAP[drug]||drug);
  if(donor) parts.push(donor);
  if(country) parts.push(country);
  if(year) parts.push(String(year));
  if(status) parts.push(status);

  return {type:'polist', label:parts.join(' · '),
    summary:{'Total POs':fmt(total),'Tablets':fmtB(tablets),'Delivered':pct(delivered,total),
             'Countries':fmt([...new Set(rows.map(r=>r.country))].length),
             'Donors':[...new Set(rows.map(r=>r.donor))].join(', '),
             'Drugs':[...new Set(rows.map(r=>r.drug_code))].map(d=>DRUG_MAP[d]||d).join(', ')},
    rows:rows.slice(0,25), total};
}

// ── builders ──────────────────────────────────────────────────────────────────
function makeOverview(){
  const total=RAW.pos.length, tablets=RAW.pos.reduce((s,r)=>s+(r.quantity||0),0);
  const delivered=RAW.pos.filter(r=>r.delivery_status==='Delivered').length;
  const dRows=RAW.by_donor.map(d=>`<tr><td><b>${d.donor}</b></td><td>${fmt(d.total_pos)}</td><td>${fmtB(d.total_tablets)}</td><td>${fmt(d.countries_supported)}</td><td>${d.drugs_donated||'—'}</td><td>${pct(d.delivered_pos,d.total_pos)}</td></tr>`).join('');
  return {type:'html',html:`
<div class="summary-card"><h3>Programme Overview</h3>
<div class="stat-grid">
  <div class="stat"><div class="val">${fmt(total)}</div><div class="lbl">Total POs</div></div>
  <div class="stat"><div class="val">${fmtB(tablets)}</div><div class="lbl">Tablets Donated</div></div>
  <div class="stat"><div class="val">105</div><div class="lbl">Countries</div></div>
  <div class="stat"><div class="val">5</div><div class="lbl">Donors</div></div>
  <div class="stat"><div class="val">6</div><div class="lbl">Drug Types</div></div>
  <div class="stat"><div class="val">${pct(delivered,total)}</div><div class="lbl">Delivered</div></div>
  <div class="stat"><div class="val">2014–2027</div><div class="lbl">Years</div></div>
</div></div>
<b>Breakdown by Donor</b>
<table><thead><tr><th>Donor</th><th>POs</th><th>Tablets</th><th>Countries</th><th>Drugs</th><th>Delivered</th></tr></thead>
<tbody>${dRows}</tbody></table>`};
}

function makeDonorSummary(donor){
  const d=RAW.by_donor.find(x=>x.donor===donor);
  if(!d) return {type:'noresult',text:`Donor "${donor}" not found.`};
  const cRows=RAW.donor_country.filter(x=>x.donor===donor)
    .sort((a,b)=>b.total_tablets-a.total_tablets).slice(0,25)
    .map(r=>`<tr><td>${r.country}</td><td>${fmt(r.total_pos)}</td><td>${fmtB(r.total_tablets)}</td><td>${r.drugs||'—'}</td><td>${pct(r.delivered_pos,r.total_pos)}</td></tr>`).join('');
  return {type:'html',html:`
<div class="summary-card"><h3>${donor} — Donor Summary</h3>
<div class="stat-grid">
  <div class="stat"><div class="val">${fmt(d.total_pos)}</div><div class="lbl">Total POs</div></div>
  <div class="stat"><div class="val">${fmtB(d.total_tablets)}</div><div class="lbl">Tablets</div></div>
  <div class="stat"><div class="val">${fmt(d.countries_supported)}</div><div class="lbl">Countries</div></div>
  <div class="stat"><div class="val">${d.drugs_donated||'—'}</div><div class="lbl">Drugs</div></div>
  <div class="stat"><div class="val">${pct(d.delivered_pos,d.total_pos)}</div><div class="lbl">Delivered</div></div>
  <div class="stat"><div class="val">${d.first_year}–${d.last_year}</div><div class="lbl">Active Years</div></div>
</div></div>
<b>Top Countries Supported by ${donor}</b>
<table><thead><tr><th>Country</th><th>POs</th><th>Tablets</th><th>Drugs</th><th>Delivered</th></tr></thead>
<tbody>${cRows}</tbody></table>`};
}

function makeDrugSummary(drug){
  const d=RAW.by_drug.find(x=>x.drug_code===drug);
  if(!d) return {type:'noresult',text:`Drug "${drug}" not found.`};
  const byC={};
  RAW.pos.filter(r=>r.drug_code===drug).forEach(r=>{
    if(!byC[r.country]) byC[r.country]={pos:0,qty:0,del:0};
    byC[r.country].pos++; byC[r.country].qty+=(r.quantity||0);
    if(r.delivery_status==='Delivered') byC[r.country].del++;
  });
  const cRows=Object.entries(byC).sort((a,b)=>b[1].qty-a[1].qty).slice(0,25)
    .map(([c,v])=>`<tr><td>${c}</td><td>${fmt(v.pos)}</td><td>${fmtB(v.qty)}</td><td>${pct(v.del,v.pos)}</td></tr>`).join('');
  return {type:'html',html:`
<div class="summary-card"><h3>${DRUG_MAP[drug]||drug} (${drug})</h3>
<div class="stat-grid">
  <div class="stat"><div class="val">${fmt(d.total_pos)}</div><div class="lbl">Total POs</div></div>
  <div class="stat"><div class="val">${fmtB(d.total_tablets)}</div><div class="lbl">Tablets</div></div>
  <div class="stat"><div class="val">${fmt(d.countries_supported)}</div><div class="lbl">Countries</div></div>
  <div class="stat"><div class="val">${d.donors}</div><div class="lbl">Donors</div></div>
  <div class="stat"><div class="val">${pct(d.delivered_pos,d.total_pos)}</div><div class="lbl">Delivered</div></div>
  <div class="stat"><div class="val">${d.first_year}–${d.last_year}</div><div class="lbl">Years</div></div>
</div></div>
<b>Countries Receiving ${DRUG_MAP[drug]||drug}</b>
<table><thead><tr><th>Country</th><th>POs</th><th>Tablets</th><th>Delivered</th></tr></thead>
<tbody>${cRows}</tbody></table>`};
}

function makeCountrySummary(country){
  const d=RAW.by_country.find(x=>x.country&&x.country.toLowerCase()===country.toLowerCase());
  if(!d) return {type:'noresult',text:`Country "${country}" not found.`};
  const poRows=RAW.pos.filter(r=>r.country&&r.country.toLowerCase()===country.toLowerCase())
    .sort((a,b)=>b.year-a.year).slice(0,25)
    .map(r=>`<tr>
      <td>${r.po_number}</td>
      <td title="${DRUG_MAP[r.drug_code]||''}">${r.drug_code}</td>
      <td>${fmt(r.quantity)}</td><td>${r.year}</td><td>${r.donor}</td>
      <td><span class="status-pill" style="${statusClass(r.delivery_status)}">${r.delivery_status||'—'}</span></td>
      <td>${r.delivery_date||'—'}</td></tr>`).join('');
  return {type:'html',html:`
<div class="summary-card"><h3>${d.country}</h3>
<div class="stat-grid">
  <div class="stat"><div class="val">${fmt(d.total_pos)}</div><div class="lbl">Total POs</div></div>
  <div class="stat"><div class="val">${fmtB(d.total_tablets)}</div><div class="lbl">Tablets</div></div>
  <div class="stat"><div class="val">${d.drug_types}</div><div class="lbl">Drug Types</div></div>
  <div class="stat"><div class="val">${d.donors}</div><div class="lbl">Donors</div></div>
  <div class="stat"><div class="val">${pct(d.delivered_pos,d.total_pos)}</div><div class="lbl">Delivered</div></div>
  <div class="stat"><div class="val">${d.first_year}–${d.last_year}</div><div class="lbl">Years</div></div>
</div>
<p style="margin-top:8px;font-size:12px;color:#555;"><b>Drugs:</b> ${(d.drugs_received||'').split(',').map(c=>(DRUG_MAP[c.trim()]||c.trim())).join(', ')}</p>
<p style="font-size:12px;color:#555;"><b>Donors:</b> ${d.donors_list||'—'}</p>
</div>
<b>All POs for ${d.country}</b>
<table><thead><tr><th>PO #</th><th>Drug</th><th>Qty</th><th>Year</th><th>Donor</th><th>Status</th><th>Delivered</th></tr></thead>
<tbody>${poRows}</tbody></table>`};
}

function makeDonorCountries(donor){
  const rows=RAW.donor_country.filter(x=>x.donor===donor).sort((a,b)=>b.total_tablets-a.total_tablets);
  const total=rows.reduce((s,r)=>s+(r.total_tablets||0),0);
  const tRows=rows.map(r=>`<tr><td>${r.country}</td><td>${fmt(r.total_pos)}</td><td>${fmtB(r.total_tablets)}</td><td>${r.drugs||'—'}</td><td>${pct(r.delivered_pos,r.total_pos)}</td></tr>`).join('');
  return {type:'html',html:`
<div class="summary-card"><h3>${donor} — ${rows.length} Countries Supported</h3>
<div class="stat-grid">
  <div class="stat"><div class="val">${fmt(rows.length)}</div><div class="lbl">Countries</div></div>
  <div class="stat"><div class="val">${fmtB(total)}</div><div class="lbl">Total Tablets</div></div>
</div></div>
<table><thead><tr><th>Country</th><th>POs</th><th>Tablets</th><th>Drugs</th><th>Delivered</th></tr></thead>
<tbody>${tRows}</tbody></table>`};
}

// ── render ────────────────────────────────────────────────────────────────────
function renderResult(r){
  if(r.type==='html'||r.type==='overview') return r.html;
  if(r.type==='clarify') return `<p>${r.text}</p>`;
  if(r.type==='noresult') return `<p style="color:#888;padding:4px 0;">⚠️ ${r.text}</p>`;
  if(r.type==='polist'){
    const stats=Object.entries(r.summary).map(([k,v])=>
      `<div class="stat"><div class="val">${v}</div><div class="lbl">${k}</div></div>`).join('');
    const tRows=r.rows.map(row=>`<tr>
      <td>${row.po_number}</td>
      <td title="${DRUG_MAP[row.drug_code]||''}">${row.drug_code}</td>
      <td>${row.country}</td><td>${fmt(row.quantity)}</td><td>${row.year}</td><td>${row.donor}</td>
      <td><span class="status-pill" style="${statusClass(row.delivery_status)}">${row.delivery_status||'—'}</span></td>
      <td>${row.delivery_date||'—'}</td></tr>`).join('');
    return `<div class="summary-card"><h3>${r.label||'Results'}</h3>
<div class="stat-grid">${stats}</div></div>
${r.total>25?`<p class="note">Showing 25 of ${fmt(r.total)} matching POs.</p>`:''}
<table><thead><tr><th>PO #</th><th>Drug</th><th>Country</th><th>Qty</th><th>Year</th><th>Donor</th><th>Status</th><th>Delivered</th></tr></thead>
<tbody>${tRows}</tbody></table>`;
  }
}

// ── UI ─────────────────────────────────────────────────────────────────────────
const chat=document.getElementById('chat'), inp=document.getElementById('inp');
const chips=document.getElementById('chips');

['Overview','GSK summary','Albendazole','Countries supported by Eisai',
 'All POs for Kenya','Praziquantel in Nigeria','POs in transit','J&J 2022',
 'Merck KGaA countries','Tanzania','DEC 2020'].forEach(q=>{
  const c=document.createElement('span');
  c.className='chip'; c.textContent=q;
  c.onclick=()=>{ inp.value=q; send(); };
  chips.appendChild(c);
});

function addMsg(role,html,isHtml=false){
  const wrap=document.createElement('div'); wrap.className=`msg ${role}`;
  const av=document.createElement('div'); av.className='avatar'; av.textContent=role==='bot'?'💊':'A';
  const bub=document.createElement('div'); bub.className='bubble';
  if(isHtml) bub.innerHTML=html; else bub.textContent=html;
  wrap.appendChild(av); wrap.appendChild(bub);
  chat.appendChild(wrap); chat.scrollTop=chat.scrollHeight;
}
function addTyping(){
  const d=document.createElement('div'); d.className='msg bot'; d.id='typing';
  d.innerHTML='<div class="avatar">💊</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(d); chat.scrollTop=chat.scrollHeight;
}
function removeTyping(){ document.getElementById('typing')?.remove(); }

function send(){
  const val=inp.value.trim(); if(!val) return;
  inp.value='';
  addMsg('user',val);
  addTyping();
  setTimeout(()=>{ removeTyping(); addMsg('bot',renderResult(query(val)),true); },350);
}
inp.addEventListener('keydown',e=>{ if(e.key==='Enter') send(); });

setTimeout(()=>{
  addMsg('bot',`<p>Hello! I have access to <b>1,721 purchase orders</b> across <b>105 countries</b>, <b>5 donors</b> (Eisai, GSK, J&J, Merck KGaA, Merck USA), and <b>6 drug types</b> covering 2014–2027.</p>
<p style="margin-top:8px;">Try one of the example queries below, or ask me something like:</p>
<ul style="margin:8px 0 0 16px;font-size:13px;line-height:1.8;">
  <li>What has <b>GSK</b> donated to <b>Kenya</b>?</li>
  <li>Show all <b>Praziquantel</b> POs</li>
  <li>Which countries does <b>Eisai</b> support?</li>
  <li>Show POs that are <b>in transit</b></li>
</ul>`,true);
},200);
</script>
